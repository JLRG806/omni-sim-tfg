services:
  backend:
    build:
      context: ./docker/backend
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: omnisim
      DB_USERNAME: omnisim
      DB_PASSWORD: omnisim_secret
      QUEUE_CONNECTION: database
      SANCTUM_STATEFUL_DOMAINS: localhost,localhost:8081,localhost:5173
      N8N_URL: "http://100.108.45.35:5678"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - omnisim

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - omnisim

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: omnisim
      POSTGRES_USER: omnisim
      POSTGRES_PASSWORD: omnisim_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnisim"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - omnisim

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8081:80"
    volumes:
      - ./docker/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - omnisim

  queue:
    build:
      context: ./docker/backend
    volumes:
      - ./backend:/var/www/html
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: omnisim
      DB_USERNAME: omnisim
      DB_PASSWORD: omnisim_secret
      QUEUE_CONNECTION: database
      N8N_URL: "http://100.108.45.35:5678"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - omnisim

  # n8n eliminado — corre en vertexlab (ver docker/docker-compose.n8n.yml)
  # Desplegar: docker --context vertexlab compose -f docker/docker-compose.n8n.yml up -d

networks:
  omnisim:
    driver: bridge

volumes:
  postgres_data:
