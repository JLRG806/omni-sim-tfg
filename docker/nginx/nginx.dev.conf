server {
    listen 80;
    server_name localhost;

    # Docker's internal DNS resolver.
    # valid=30s: re-resolves hostnames every 30s so that if a container restarts
    # with a new IP, Nginx picks it up automatically without restarting itself.
    resolver 127.0.0.11 valid=30s;

    # ── Vite HMR WebSocket ────────────────────────────────────────────────────
    # Must be matched before the catch-all '/' location.
    location /@vite/ {
        set $upstream_frontend http://frontend:5173;
        proxy_pass $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── Laravel API ───────────────────────────────────────────────────────────
    location /api/ {
        set $upstream_backend http://backend:8000;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Sanctum CSRF cookie (SPA auth) ────────────────────────────────────────
    location /sanctum/ {
        set $upstream_backend http://backend:8000;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Vue SPA + Vite dev server (HMR included) ──────────────────────────────
    location / {
        set $upstream_frontend http://frontend:5173;
        proxy_pass $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
